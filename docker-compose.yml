services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: marksuser
      POSTGRES_PASSWORD: markspass
      POSTGRES_DB: marksdb
    # Pre-seed script is required as a volume to load mock database
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_NAME: marksdb
      DB_USER: marksuser
      DB_PASSWORD: markspass
      FLASK_ENV: development
    depends_on:
      - db
    ports:
      - "5000:5000"
    
  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

  automark:
    build: ./automark
    depends_on:
      - backend
      - db
    profiles:
      - debug
volumes:
  pgdata: